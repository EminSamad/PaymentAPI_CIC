version: '3.8'

services:
  db:
    image: postgres:17
    container_name: paymentdb
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: EminSamad
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: payment-redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: payment-app
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis

volumes:
  postgres_data: